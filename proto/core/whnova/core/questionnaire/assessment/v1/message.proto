edition = "2023";

package whnova.core.questionnaire.assessment.v1;

import "google/api/field_behavior.proto";
import "whnova/core/questionnaire/v1/message.proto";

enum RiskLevel {
  RISK_LEVEL_UNSPECIFIED = 0;
  RISK_LEVEL_LOW = 1;
  RISK_LEVEL_MEDIUM = 2;
  RISK_LEVEL_HIGH = 3;
}

message RiskScore {
  double value = 1 [(google.api.field_behavior) = REQUIRED];
  double max_value = 2 [(google.api.field_behavior) = REQUIRED];
}

message RiskScoreBreakdown {
  RiskScore raw = 1 [(google.api.field_behavior) = REQUIRED];
  RiskScore weighted = 2 [(google.api.field_behavior) = REQUIRED];
  double weight = 3 [(google.api.field_behavior) = REQUIRED];
}

message QuestionCategoryRiskScore {
  whnova.core.questionnaire.v1.QuestionCategory category = 1 [(google.api.field_behavior) = REQUIRED];
  RiskScoreBreakdown score = 2 [(google.api.field_behavior) = REQUIRED];
}

message RiskScoreOverall {
  RiskScore raw = 1 [(google.api.field_behavior) = REQUIRED];
  RiskScore weighted = 2 [(google.api.field_behavior) = REQUIRED];
  repeated QuestionCategoryRiskScore category_scores = 3 [(google.api.field_behavior) = REQUIRED];
}
