  string help_text = 3 [(google.api.field_behavior) = REQUIRED];
  repeated FrameworkMappingResult frameworks = 4 [(google.api.field_behavior) = REQUIRED];
}

message FrameworkMappingResult {
  string framework_id = 1 [(google.api.field_behavior) = REQUIRED];
  string display_name = 2 [(google.api.field_behavior) = REQUIRED];
  repeated ReferenceGroup reference_groups = 3 [(google.api.field_behavior) = REQUIRED];
}

message ReferenceGroup {
  string group_name = 1 [(google.api.field_behavior) = REQUIRED];
