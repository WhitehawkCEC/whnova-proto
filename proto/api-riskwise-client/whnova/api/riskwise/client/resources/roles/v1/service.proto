edition = "2023";

package whnova.api.riskwise.client.resources.roles.v1;

import "google/api/field_behavior.proto";
import "whnova/core/iam/v1/message.proto";

service Service {
  rpc List(ListRequest) returns (stream ListResponse) {}
}

message ListRequest {}

message ListResponse {
  message Entry {
    whnova.core.iam.v1.RoleId role_id = 1 [(google.api.field_behavior) = REQUIRED];
    string key = 2 [(google.api.field_behavior) = REQUIRED];
    string name = 3 [(google.api.field_behavior) = REQUIRED];
    string description = 4 [(google.api.field_behavior) = REQUIRED];
  }

  repeated Entry entries = 1 [(google.api.field_behavior) = REQUIRED];
}
