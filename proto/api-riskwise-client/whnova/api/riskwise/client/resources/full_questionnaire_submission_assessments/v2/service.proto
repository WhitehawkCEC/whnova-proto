edition = "2023";

package whnova.api.riskwise.client.resources.full_questionnaire_submission_assessments.v2;

import "google/api/field_behavior.proto";
import "whnova/core/questionnaire/assessment/v1/message.proto";
import "whnova/core/questionnaire/v1/message.proto";
import "whnova/core/time/v1/message.proto";

service Service {
  rpc Read(ReadRequest) returns (ReadResponse) {}
  rpc List(ListRequest) returns (stream ListResponse) {}
}

message ReadRequest {
  whnova.core.questionnaire.v1.QuestionnaireSubmissionId submission_id = 1 [(google.api.field_behavior) = REQUIRED];
}

message ReadResponse {
  message Observation {
    message None {}

    message Text {
      repeated string paragraphs = 1 [(google.api.field_behavior) = REQUIRED];
    }

    oneof value {
      None none = 1;
      Text text = 2;
    }
  }

  message Recommendation {
    message None {}

    message Text {
      repeated string paragraphs = 1 [(google.api.field_behavior) = REQUIRED];
    }

    oneof value {
      None none = 1;
      Text text = 2;
    }
  }

  message QuestionEntry {
    whnova.core.questionnaire.assessment.v1.RiskScoreBreakdown score = 1 [(google.api.field_behavior) = REQUIRED];
    Observation observation = 2 [(google.api.field_behavior) = REQUIRED];
    Recommendation recommendation = 3 [(google.api.field_behavior) = REQUIRED];
  }

  message QuestionEntries {
    QuestionEntry q1 = 1 [(google.api.field_behavior) = REQUIRED];
    QuestionEntry q2 = 2 [(google.api.field_behavior) = REQUIRED];
    QuestionEntry q3 = 3 [(google.api.field_behavior) = REQUIRED];
    QuestionEntry q4 = 4 [(google.api.field_behavior) = REQUIRED];
