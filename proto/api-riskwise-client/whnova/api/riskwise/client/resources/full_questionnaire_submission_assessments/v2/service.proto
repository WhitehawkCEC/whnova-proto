  whnova.core.questionnaire.v1.LeadQuestionnaireCompleteSubmission lead = 2 [(google.api.field_behavior) = REQUIRED];
  whnova.core.questionnaire.v1.MainQuestionnaireCompleteSubmission main = 3 [(google.api.field_behavior) = REQUIRED];
  QuestionEntries question_entries = 4 [(google.api.field_behavior) = REQUIRED];
  whnova.core.questionnaire.assessment.v1.RiskScoreOverall overall_score = 5 [(google.api.field_behavior) = REQUIRED];
