  whnova.core.time.v1.IsoDateTime created_at = 7 [(google.api.field_behavior) = REQUIRED];
}

message ListRequest {}

message ListResponse {
  message Entry {
    whnova.core.questionnaire.v1.QuestionnaireSubmissionId submission_id = 1 [(google.api.field_behavior) = REQUIRED];
    whnova.core.questionnaire.v1.LeadQuestionnaireCompleteSubmission lead = 2 [(google.api.field_behavior) = REQUIRED];
    whnova.core.questionnaire.v1.MainQuestionnaireCompleteSubmission main = 3 [(google.api.field_behavior) = REQUIRED];
    whnova.core.questionnaire.assessment.v1.RiskScoreOverall overall_score = 4 [(google.api.field_behavior) = REQUIRED];
    whnova.core.questionnaire.assessment.v1.RiskLevel overall_level = 5 [(google.api.field_behavior) = REQUIRED];
    whnova.core.time.v1.IsoDateTime created_at = 6 [(google.api.field_behavior) = REQUIRED];
  }

  repeated Entry entries = 1 [(google.api.field_behavior) = REQUIRED];
}
