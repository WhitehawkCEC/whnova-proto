edition = "2023";

package whnova.api.riskwise.client.resources.product_catalog.v1;

import "google/api/field_behavior.proto";
import "whnova/core/product/v1/message.proto";

service Service {
  rpc Get(GetRequest) returns (GetResponse) {}
}

message GetRequest {}

message GetResponse {
  repeated Product products = 1 [(google.api.field_behavior) = REQUIRED];
}

message Product {
  whnova.core.product.v1.ProductId id = 1 [(google.api.field_behavior) = REQUIRED];
  string name = 2 [(google.api.field_behavior) = REQUIRED];
  string description = 3 [(google.api.field_behavior) = REQUIRED];
  repeated string features = 4 [(google.api.field_behavior) = REQUIRED];
  int32 amount = 5 [(google.api.field_behavior) = REQUIRED];
  string currency = 6 [(google.api.field_behavior) = REQUIRED];
}
